<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Gateway</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* The Book Container */
        .book { width: 300px; height: 400px; position: relative; perspective: 1000px; cursor: pointer; }
        
        /* Pages */
        .cover { width: 100%; height: 100%; background: #8b0000; color: white; border-radius: 0 5px 5px 0; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 24px; position: absolute; transform-origin: left; transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1); z-index: 2; box-shadow: 5px 5px 20px rgba(0,0,0,0.5); }
        .page { width: 100%; height: 100%; background: #f5f5f5; color: #333; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; z-index: 1; border-radius: 0 5px 5px 0; }

        /* Animation Trigger */
        .book.open .cover { transform: rotateY(-160deg); }
        
        .rtfm-text { font-size: 32px; font-weight: 900; color: #d00; margin: 0; }
        .redirect-msg { margin-top: 20px; font-size: 14px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="book" id="manual">
        <div class="cover">HELP DOCS</div>
        <div class="page">
            <p class="rtfm-text">READ THE F*CKING MANUAL</p>
            <p class="redirect-msg">Redirecting to documentation...</p>
        </div>
    </div>

    <script>
        const book = document.getElementById('manual');
        const targetUrl = "https://www.htwsaar.de/studium-und-lehre/service-und-beratung/rund-ums-studium/praxisreferat/pi"; 

        
        window.onload = () => {
            setTimeout(() => {
                book.classList.add('open');
                
                
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 3000); 
            }, 500);
        };
    </script>
</body>
</html>
